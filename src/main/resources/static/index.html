<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club RESTfull</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="alertBox"></div>

    <header class="app-header">
        <div class="container d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <i class="fas fa-dumbbell brand-icon"></i>
                <div>
                    <h1>Club <span>RESTfull</span></h1>
                    <p class="subtitle">Panel de Socios</p>
                </div>
            </div>
        </div>
    </header>

    <main class="container py-4">
        <div class="row g-4">

            <div class="col-lg-5">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-plus-circle"></i> Nueva Reserva
                    </div>
                    <div class="card-body">
                        <form id="formReserva">
                            <div class="mb-3">
                                <label for="id_clase" class="form-label">Clase</label>
                                <select class="form-select" id="id_clase" required>
                                    <option value="">Selecciona una clase...</option>
                                    <option value="1">Spinning</option>
                                    <option value="2">Yoga</option>
                                    <option value="3">CrossFit</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="socio" class="form-label">Nombre del Socio</label>
                                <input type="text" class="form-control" id="socio" placeholder="Ej: Ana López" required>
                            </div>
                            <div class="mb-3">
                                <label for="fecha" class="form-label">Fecha</label>
                                <input type="date" class="form-control" id="fecha" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                <i class="fas fa-check"></i> Reservar
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-search"></i> Buscar Reservas
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
                            <input type="text" class="form-control" id="inputBusqueda" placeholder="Buscar por nombre de socio o clase...">
                            <button class="btn btn-primary" id="btnBuscar">
                                <i class="fas fa-search"></i> Buscar
                            </button>
                        </div>
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Socio</th>
                                        <th>Clase</th>
                                        <th>Fecha</th>
                                        <th class="text-center">Editar</th>
                                        <th class="text-center">Eliminar</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaReservas"></tbody>
                            </table>
                        </div>
                        <div id="emptyState" class="empty-state d-none">
                            <i class="fas fa-inbox"></i>
                            <p>No se encontraron reservas.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Modal Editar Reserva -->
    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-edit"></i> Editar Reserva</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditar">
                        <input type="hidden" id="edit_id">
                        <div class="mb-3">
                            <label for="edit_id_clase" class="form-label">Clase</label>
                            <select class="form-select" id="edit_id_clase" required>
                                <option value="">Selecciona una clase...</option>
                                <option value="1">Spinning</option>
                                <option value="2">Yoga</option>
                                <option value="3">CrossFit</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="edit_socio" class="form-label">Nombre del Socio</label>
                            <input type="text" class="form-control" id="edit_socio" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit_fecha" class="form-label">Fecha</label>
                            <input type="date" class="form-control" id="edit_fecha" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-save"></i> Guardar Cambios
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js" defer></script>
</body>
</html>
